name: Build TrustTunnel runtime images

on:
  push:
    branches:
      - "*"
    paths:
      - 'Dockerfile'
      - 'tools/classic_agent/**'
      - 'tools/Cargo.toml'
      - 'lib/**'
      - 'deeplink/**'
      - 'macros/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/build-classic-agent-image.yml'
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - 'Dockerfile'
      - 'tools/classic_agent/**'
      - 'tools/Cargo.toml'
      - 'lib/**'
      - 'deeplink/**'
      - 'macros/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/build-classic-agent-image.yml'
  workflow_dispatch:

env:
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  PUBLISH_REGISTRY: ghcr.io
  PUBLISH_NAMESPACE: ${{ github.repository_owner }}

jobs:
  runtime-images:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'skipci:')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Select publish registry
        if: github.event_name != 'pull_request'
        run: |
          if [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "PUBLISH_REGISTRY=docker.io" >> "${GITHUB_ENV}"
            echo "PUBLISH_NAMESPACE=jah0x" >> "${GITHUB_ENV}"
          else
            echo "PUBLISH_REGISTRY=ghcr.io" >> "${GITHUB_ENV}"
            echo "PUBLISH_NAMESPACE=${GITHUB_REPOSITORY_OWNER}" >> "${GITHUB_ENV}"
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: jah0x
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && env.DOCKERHUB_TOKEN == ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract classic agent image metadata
        id: classic-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PUBLISH_REGISTRY }}/${{ env.PUBLISH_NAMESPACE }}/trusttunnel-classic-agent
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=run-${{ github.run_id }}-${{ github.run_attempt }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract endpoint image metadata
        id: endpoint-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PUBLISH_REGISTRY }}/${{ env.PUBLISH_NAMESPACE }}/trusttunnel-endpoint
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=run-${{ github.run_id }}-${{ github.run_attempt }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build classic agent image
        id: classic-build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: trusttunnel-classic-agent
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.classic-meta.outputs.tags }}
          labels: ${{ steps.classic-meta.outputs.labels }}
          build-args: |
            BUILD_GIT_SHA=${{ github.sha }}
            BUILD_TIMESTAMP=${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build endpoint image
        id: endpoint-build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: trusttunnel-endpoint
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.endpoint-meta.outputs.tags }}
          labels: ${{ steps.endpoint-meta.outputs.labels }}
          build-args: |
            BUILD_GIT_SHA=${{ github.sha }}
            BUILD_TIMESTAMP=${{ github.run_id }}-${{ github.run_attempt }}

      - name: Enforce immutable tag and publish digest diagnostics
        run: |
          set -eu
          tags="${{ steps.classic-meta.outputs.tags }}"
          if ! printf '%s\n' "$tags" | grep -qv ':latest$'; then
            echo "classic-agent image tags must include immutable non-latest tag" >&2
            exit 1
          fi
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "classic-agent image digest=${{ steps.classic-build.outputs.digest }}"
            echo "endpoint image digest=${{ steps.endpoint-build.outputs.digest }}"
          fi
