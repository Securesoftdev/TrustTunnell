name: Build production images

on:
  push:
    branches:
      - "*"
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'Makefile'
      - 'endpoint/**'
      - 'lib/**'
      - 'tools/**'
      - '.github/workflows/build-images.yml'
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

env:
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  PUBLISH_REGISTRY: ghcr.io
  PUBLISH_NAMESPACE: ${{ github.repository_owner }}

jobs:
  docker-images:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'skipci:')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect endpoint image changes
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            endpoint_image:
              - 'Dockerfile'
              - 'docker-entrypoint.sh'
              - 'endpoint/**'
              - 'lib/**'
              - 'deeplink/**'
              - 'macros/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/build-images.yml'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Select publish registry
        if: github.event_name != 'pull_request'
        run: |
          if [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "PUBLISH_REGISTRY=docker.io" >> "${GITHUB_ENV}"
            echo "PUBLISH_NAMESPACE=jah0x" >> "${GITHUB_ENV}"
          else
            echo "PUBLISH_REGISTRY=ghcr.io" >> "${GITHUB_ENV}"
            echo "PUBLISH_NAMESPACE=${GITHUB_REPOSITORY_OWNER}" >> "${GITHUB_ENV}"
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: jah0x
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && env.DOCKERHUB_TOKEN == ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract endpoint image metadata
        if: steps.changed.outputs.endpoint_image == 'true'
        id: endpoint-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PUBLISH_REGISTRY }}/${{ env.PUBLISH_NAMESPACE }}/trusttunnel-endpoint
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build endpoint image
        if: steps.changed.outputs.endpoint_image == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: trusttunnel-endpoint
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.endpoint-meta.outputs.tags }}
          labels: ${{ steps.endpoint-meta.outputs.labels }}

      - name: Endpoint image build skipped
        if: steps.changed.outputs.endpoint_image != 'true'
        run: echo "No endpoint-related changes detected; skipping trusttunnel-endpoint image build/publish."

      - name: Extract classic agent image metadata
        id: classic-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PUBLISH_REGISTRY }}/${{ env.PUBLISH_NAMESPACE }}/trusttunnel-classic-agent
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build classic agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: trusttunnel-classic-agent
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.classic-meta.outputs.tags }}
          labels: ${{ steps.classic-meta.outputs.labels }}
